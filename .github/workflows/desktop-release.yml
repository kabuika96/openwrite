name: Desktop Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS desktop release
    runs-on: macos-latest

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release version
        run: npm run check:release

      - name: Run project checks
        run: npm run check

      - name: Build desktop artifacts
        run: npm run package:desktop

      - name: Write desktop checksums
        run: |
          cd desktop/release
          shasum -a 256 OpenWrite-*.dmg OpenWrite-*.zip > SHASUMS256.txt

      - name: Publish desktop release
        run: |
          notes="Unsigned macOS desktop wrapper build. Use the DMG first; see docs/DESKTOP_RELEASE.md for install and update details."
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              desktop/release/OpenWrite-*.dmg \
              desktop/release/OpenWrite-*.zip \
              desktop/release/SHASUMS256.txt \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              desktop/release/OpenWrite-*.dmg \
              desktop/release/OpenWrite-*.zip \
              desktop/release/SHASUMS256.txt \
              --repo "$GITHUB_REPOSITORY" \
              --title "${GITHUB_REF_NAME#v}" \
              --notes "$notes"
          fi
